# Two services are available:
#
#   gptme-server  — headless API server for use with the web UI:
#
#       docker compose up --build
#
#   computer-use  — full sandboxed desktop environment with VNC streaming
#                   for computer-use tasks (issue #216):
#
#       docker compose up --build computer-use
#
#   Then open http://localhost:6080 in your browser for the live VNC view
#   and http://localhost:8080 for the gptme chat interface.
#
# Configuration: copy .env.example to .env and fill in at least one provider
# key. Everything below reads from that .env file (or your shell environment).
services:
  gptme-server:
    build:
      context: .
      dockerfile: scripts/Dockerfile.selfhost
    image: gptme-server:selfhost
    ports:
      - "${GPTME_SERVER_PORT:-5700}:5700"
    environment:
      # At least one provider key is required to run conversations.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Auth token (the server enables auth by default on 0.0.0.0). Set this and
      # configure the web UI with the same value; if blank, one is auto-generated
      # at startup — see `docker compose logs`.
      GPTME_SERVER_TOKEN: ${GPTME_SERVER_TOKEN:-}
    # Appended to the image's entrypoint (gptme-server serve --host 0.0.0.0
    # --port 5700). Allows the configured web UI origin to call this server.
    command:
      - --cors-origin
      - ${CORS_ORIGIN:-https://chat.gptme.org}
    volumes:
      # Persist config, credentials, and conversation logs across restarts.
      - gptme-config:/home/gptme/.config/gptme
      - gptme-data:/home/gptme/.local/share/gptme
    restart: unless-stopped

  # Sandboxed desktop environment for computer-use tasks (issue #216).
  #
  # Runs a full X11 desktop inside Docker with VNC streaming via noVNC so you
  # can watch (and optionally intervene) as gptme controls the virtual desktop.
  #
  # Note: No persistent volumes are mounted — all conversation data, credentials,
  # and state are ephemeral and lost on container stop/remove. This is intentional
  # for the sandboxed/ephemeral use case; use gptme-server for persistent sessions.
  #
  # Ports:
  #   6080 — noVNC web interface (open in browser to see the live desktop)
  #   8080 — gptme server with computer + browser tools enabled
  #
  # Usage:
  #   docker compose up --build computer-use
  #   # Open http://localhost:6080 to watch the desktop
  #   # Then start a gptme conversation that uses --tools computer,browser
  computer-use:
    build:
      context: .
      dockerfile: scripts/Dockerfile.computer
    image: gptme-computer-use
    ports:
      # noVNC web interface — watch the live desktop in any browser
      - "${NOVNC_PORT:-6080}:6080"
      # gptme server with computer + browser tools
      - "${COMPUTER_SERVER_PORT:-8080}:8080"
    environment:
      # At least one provider key is required to run conversations.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Virtual display resolution (must match Xvfb resolution in Dockerfile)
      WIDTH: ${COMPUTER_WIDTH:-1024}
      HEIGHT: ${COMPUTER_HEIGHT:-768}
      DISPLAY_NUM: ${COMPUTER_DISPLAY_NUM:-1}
    # Default: don't start automatically with `docker compose up` (only start
    # when explicitly requested via `docker compose up computer-use`).
    profiles:
      - computer-use

volumes:
  gptme-config:
  gptme-data:
